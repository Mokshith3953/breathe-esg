services:
  - type: web
    name: breathe-esg
    runtime: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn esg.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg.onrender.com"

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg
    plan: free
